name: 溢价率监控

on:
  schedule:
    # 北京时间 08:30 = UTC 00:30，周一到周五（也作为兜底，主触发为外部 cron）
    - cron: '30 0 * * 1-5'
  workflow_dispatch:  # 支持手动触发（用于测试）

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装中文字体
        run: sudo apt-get install -y fonts-noto-cjk

      - run: pip install akshare pandas matplotlib numpy yfinance
      - run: pip install -e .

      - name: 检查溢价率并推送通知
        run: python scripts/fund_alert.py
        env:
          FUND_SYMBOLS: ${{ vars.FUND_SYMBOLS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}

      - name: 同步缓存到仓库
        run: |
          git config user.name "fund-alert-bot"
          git config user.email "bot@fund-alert"
          git add -f fund_cache/
          git diff --staged --quiet || \
            (git commit -m "chore: update cache [skip ci]" && git push)
